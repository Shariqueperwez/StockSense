<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>StockSense — Smart Trading & Investing</title>
    <style>
      @media (max-width: 768px) {
        * { box-sizing: border-box !important; }
        body { overflow-x: hidden !important; width: 100vw !important; }
        #root { overflow-x: hidden; width: 100%; }

        /* Fix all divs overflowing */
        div { max-width: 100vw; }

        /* Navbar wraps on mobile */
        .navbar {
          flex-wrap: wrap !important;
          padding: 6px 10px !important;
          gap: 4px !important;
          min-height: auto !important;
        }

        /* Nav links scroll horizontally */
        .nav-links {
          width: 100% !important;
          overflow-x: auto !important;
          padding-bottom: 2px !important;
          flex-wrap: nowrap !important;
        }
        .nav-links a {
          font-size: 0.68rem !important;
          padding: 5px 7px !important;
        }

        /* Container padding */
        .container { padding: 8px !important; }

        /* Glass panels */
        .glass-panel { padding: 12px !important; border-radius: 10px !important; }
        .glass-panel-sm { padding: 10px !important; }

        /* All flex containers wrap */
        .flex { flex-wrap: wrap !important; }

        /* Tables scroll */
        .data-table { display: block; overflow-x: auto; }

        /* Inputs dont zoom on iOS */
        input, select, textarea { font-size: 16px !important; }

        /* Fix inline grid styles */
        [style*="grid-template-columns"] {
          display: flex !important;
          flex-direction: column !important;
          gap: 10px !important;
        }

        /* Fix large fixed widths */
        [style*="minWidth"] { min-width: unset !important; }
        [style*="min-width"] { min-width: unset !important; }
      }

      @media (max-width: 480px) {
        .navbar { padding: 4px 8px !important; }
        .container { padding: 6px !important; }
        h1 { font-size: 1.2rem !important; }
        h2 { font-size: 1rem !important; }
        h3 { font-size: 0.9rem !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
